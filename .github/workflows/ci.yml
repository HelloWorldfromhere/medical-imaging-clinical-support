name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio httpx pyspark>=3.5.0
          pip install -r requirements.txt

      - name: Lint with ruff
        run: python -m ruff check . --output-format=github

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Run Spark pipeline (scale test)
        run: python -m pipelines.spark_corpus_pipeline --scale-test --partitions 2